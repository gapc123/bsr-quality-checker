[phases.setup]
nixPkgs = ["nodejs_20", "chromium", "python3"]

[phases.install]
cmds = [
    "rm -f package-lock.json packages/*/package-lock.json",
    "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
    "echo 'Cache bust: $BUILD_CACHE_BUST'",
    "rm -rf packages/frontend/dist packages/backend/dist",
    "rm -rf node_modules/.vite node_modules/.cache",
    "cd packages/backend && npx prisma generate",
    "npm run build --workspace=packages/frontend",
    "npm run build --workspace=packages/backend",
    "ls -la packages/frontend/dist/assets/",
    "echo '📊 Running database migrations...'",
    "cd packages/backend && npx prisma migrate deploy",
    "echo '✅ Database migrations complete'"
]

[start]
cmd = "node packages/backend/dist/index.js"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
NODE_ENV = "production"
